<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velvet Elite Application</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #ffffff;
    line-height: 1.6;
}

/* CONTAINER */
.container {
    max-width: 750px;
    margin: auto;
    padding: 16px;
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px 16px;
}

.header h1 {
    color: #7CFFB2;
    margin-bottom: 10px;
}

.header p {
    opacity: 0.8;
}

/* CARD */
.card {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #333;
}

/* INPUTS */
label {
    font-size: 13px;
    color: #bbb;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 8px 0 14px 0;
    border-radius: 6px;
    border: none;
    background: #111;
    color: #fff;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 15px;
    background: #7CFFB2;
    color: #000;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.btn:hover {
    opacity: 0.9;
}

/* FOOTER NOTE */
.note {
    text-align: center;
    font-size: 12px;
    opacity: 0.6;
    margin-top: 12px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
    <h1>💎 Velvet Elite Application</h1>
    <p>Private international matchmaking network (selective approval only)</p>
</div>

<div class="card">

<form action="https://formspree.io/f/xqewnrey" method="POST">

<!-- EMAIL SUBJECT -->
<input type="hidden" name="_subject" value="New Velvet Elite Application">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Age</label>
<input type="number" name="age" required>

<label>Location (Country / City)</label>
<input type="text" name="location" required>

<label>Occupation</label>
<input type="text" name="occupation">

<label>Relationship Goal</label>
<input type="text" name="goal">

<label>Preferred Countries</label>
<input type="text" name="countries">

<label>About You</label>
<textarea name="message" rows="5" placeholder="Tell us about yourself..."></textarea>

<button class="btn" type="submit">
Submit Application
</button>

</form>

<div class="note">
Not all applicants are accepted. Only selected profiles receive access to the network.
</div>

</div>

</div>

</body>
</html>
