<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velvet Elite - Women Application</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* {
    box-sizing: border-box;
}

body {
    margin:0;
    font-family: Arial;
    background:#0b0b0b;
    color:#d4af37; /* GOLD */
}

/* CONTAINER */
.container {
    max-width:800px;
    margin:auto;
    padding:20px;
}

/* TITLE */
h1 {
    color:#d4af37;
    text-align:center;
    margin: 0 0 20px 0;
    letter-spacing: 1px;
}

/* CARD */
.card {
    background:#141414;
    padding:22px;
    border-radius:12px;
    border:1px solid rgba(212, 175, 55, 0.25);
    margin-bottom:15px;
    color:#d4af37;
}

/* TEXT */
p {
    margin:0;
    opacity:0.9;
}

/* INPUTS */
input, textarea {
    width:100%;
    padding:12px;
    margin:8px 0 14px 0;
    background:#111;
    border:1px solid rgba(212, 175, 55, 0.2);
    color:#d4af37;
    border-radius:6px;
    outline:none;
}

/* focus glow */
input:focus, textarea:focus {
    border-color:#d4af37;
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
}

/* BUTTON */
button {
    width:100%;
    padding:16px;
    background:#d4af37;
    color:#0b0b0b;
    border:none;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:0.2s ease;
}

button:hover {
    background:#e6c35a;
}

</style>
</head>

<body>

<div class="container">

<h1>💎 Women Application</h1>

<div class="card">
<p>
Apply to be considered for private international introductions. All profiles are reviewed manually.
</p>
</div>

<div class="card">

<form action="https://formsubmit.co/rg.salesnetwork@gmail.com" method="POST">

<input type="hidden" name="_next" value="https://velvetroyale.github.io/velvet-elite/thanks.html">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Velvet Elite Women Application">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Age</label>
<input type="number" name="age" required>

<label>Location</label>
<input type="text" name="location" required>

<label>About You</label>
<textarea name="message"></textarea>

<button type="submit">Submit Application</button>

</form>

</div>

</div>

</body>
</html>
