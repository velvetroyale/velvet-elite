<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velvet Elite - Men Application</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* {
    box-sizing: border-box;
}

body {
    margin:0;
    font-family: Arial;
    background:#0b0b0b;
    color:#d4af37;
}

.container {
    max-width:850px;
    margin:auto;
    padding:20px;
}

h1 {
    color:#d4af37;
    text-align:center;
    margin: 0 0 20px 0;
    letter-spacing: 1px;
}

.card {
    background:#141414;
    padding:22px;
    border-radius:12px;
    border:1px solid rgba(212, 175, 55, 0.25);
    margin-bottom:15px;
}

input, textarea {
    width:100%;
    padding:12px;
    margin:8px 0 14px 0;
    background:#111;
    border:1px solid rgba(212, 175, 55, 0.2);
    color:#d4af37;
    border-radius:6px;
    outline:none;
}

input:focus, textarea:focus {
    border-color:#d4af37;
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
}

button {
    width:100%;
    padding:16px;
    background:#d4af37;
    color:#0b0b0b;
    border:none;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:0.2s ease;
}

button:hover {
    background:#e6c35a;
}

label {
    font-size:14px;
    opacity:0.9;
}

.required {
    color:#e6c35a;
}

p {
    margin:0;
    opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h1>💼 Men Application</h1>

<div class="card">
<p>
Apply for access to Velvet Elite private matchmaking system.
Applications are reviewed for approval.
</p>
</div>

<div class="card">

<form action="https://formsubmit.co/rg.salesnetwork@gmail.com" method="POST">

<input type="hidden" name="_next" value="https://velvetroyale.github.io/velvet-elite/thanks.html">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Velvet Elite Men Application">

<label>First Name <span class="required">*</span></label>
<input type="text" name="first_name" required minlength="2">

<label>Last Name <span class="required">*</span></label>
<input type="text" name="last_name" required minlength="2">

<label>Email <span class="required">*</span></label>
<input type="email" name="email" required>

<label>Phone</label>
<input type="tel" name="phone" pattern="[0-9+\-\s]{7,15}" placeholder="+1 234 567 890">

<label>Age</label>
<input type="number" name="age" min="18" required>

<label>Location</label>
<input type="text" name="location" required>

<label>Occupation</label>
<input type="text" name="occupation">

<label>Relationship Goals</label>
<input type="text" name="goal">

<label>Message</label>
<textarea name="message"></textarea>

<button type="submit">Submit Application</button>

</form>

</div>

</div>

</body>
</html>
