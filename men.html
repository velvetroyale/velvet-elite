<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velvet Elite | Private Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0b0b;
color:#d4af37;
display:flex;
justify-content:center;
min-height:100vh;
}
.container{max-width:850px;width:100%;padding:20px;text-align:center;}

.hero{
background:linear-gradient(135deg,#0b0b0b,#17120a);
border:1px solid rgba(212,175,55,0.18);
border-radius:18px;
padding:40px 25px;
margin-bottom:20px;
}

.badge{
display:inline-block;
padding:8px 14px;
border-radius:100px;
border:1px solid rgba(212,175,55,0.35);
background:#141414;
font-size:12px;
letter-spacing:1px;
margin-bottom:18px;
}

h1{
margin:0 0 18px;
font-size:42px;
line-height:1.1;
color:#f5d97a;
}

.hero p{
color:#d7d7d7;
font-size:17px;
line-height:1.7;
max-width:700px;
margin:auto;
}

.benefits{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
margin-top:30px;
}

.benefit{
background:#141414;
border:1px solid rgba(212,175,55,0.14);
border-radius:12px;
padding:16px;
font-size:14px;
}

.card{
background:#141414;
padding:24px;
border-radius:16px;
border:1px solid rgba(212,175,55,0.18);
margin-bottom:18px;
text-align:left;
}

label{font-size:14px;opacity:0.92;display:block;margin-bottom:5px;}

input{
width:100%;
padding:14px;
margin:0 0 18px;
background:#111;
border:1px solid rgba(212,175,55,0.18);
color:#f5d97a;
border-radius:10px;
font-size:15px;
}

button{
margin-top:20px;
padding:16px;
background:#d4af37;
border:none;
font-weight:700;
border-radius:12px;
cursor:pointer;
width:100%;
}

.language-bar{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
margin-bottom:25px;
}

.language-btn{
padding:7px 12px;
border-radius:20px;
font-size:11px;
background:#141414;
color:#d4af37;
border:1px solid rgba(212,175,55,0.25);
cursor:pointer;
}

.language-btn.active{
background:#d4af37;
color:#0b0b0b;
}

</style>
</head>

<body>

<div class="container">

<div class="language-bar">
<button class="language-btn active" onclick="setLang('en',this)">English</button>
<button class="language-btn" onclick="setLang('es',this)">Español</button>
<button class="language-btn" onclick="setLang('fr',this)">Français</button>
<button class="language-btn" onclick="setLang('it',this)">Italiano</button>
<button class="language-btn" onclick="setLang('de',this)">Deutsch</button>
<button class="language-btn" onclick="setLang('ru',this)">Русский</button>
<button class="language-btn" onclick="setLang('tl',this)">Tagalog</button>
</div>

<div class="hero">
<div class="badge" id="badge">PRIVATE INTERNATIONAL MATCHMAKING</div>
<h1 id="title">Request Private Access</h1>
<p id="desc">Velvet Elite is a private international introduction network...</p>

<div class="benefits">
<div class="benefit" id="b1">✔ No public profiles</div>
<div class="benefit" id="b2">✔ Private introductions only</div>
<div class="benefit" id="b3">✔ International member network</div>
<div class="benefit" id="b4">✔ Applications reviewed manually</div>
</div>
</div>

<div class="card">
<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="e092569b-da4e-40d5-8da1-f3e18c98eaf4">
<input type="hidden" name="Selected Language" id="selectedLanguage" value="English">

<label data-key="first">First Name *</label>
<input type="text" required>

<label data-key="email">Email *</label>
<input type="email" required>

<label data-key="age">Age *</label>
<input type="number" required>

<label data-key="location">Location *</label>
<input type="text" required>

<button id="btn">Request Invitation</button>

<div class="privacy" id="privacy">
🔒 Private & confidential. No swiping.
</div>

</form>
</div>

</div>

<script>

const lang = {
en:{badge:"PRIVATE INTERNATIONAL MATCHMAKING",title:"Request Private Access",btn:"Request Invitation"},
es:{badge:"MATCHMAKING INTERNACIONAL PRIVADO",title:"Solicitar Acceso Privado",btn:"Solicitar Invitación"},
fr:{badge:"MATCHMAKING INTERNATIONAL PRIVÉ",title:"Demander un Accès Privé",btn:"Demander une invitation"},
it:{badge:"MATCHMAKING INTERNAZIONALE PRIVATO",title:"Richiedi Accesso Privato",btn:"Richiedi Invito"},
de:{badge:"PRIVATES INTERNATIONALES MATCHMAKING",title:"Privaten Zugang anfordern",btn:"Einladung anfordern"},
ru:{badge:"ЧАСТНОЕ МЕЖДУНАРОДНОЕ ЗНАКОМСТВО",title:"Запросить доступ",btn:"Запросить"},
tl:{badge:"PRIBADONG MATCHMAKING",title:"Humiling ng Access",btn:"Humiling"}
};

function setLang(l,btn){

localStorage.setItem("lang",l);

document.querySelectorAll('.language-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

const t=lang[l];
if(!t) return;

document.getElementById("badge").innerText=t.badge;
document.getElementById("title").innerText=t.title;
document.getElementById("btn").innerText=t.btn;

document.getElementById("selectedLanguage").value=l;

}

window.onload=function(){

let saved=localStorage.getItem("lang");
let browser=navigator.language.slice(0,2);

let langToUse=saved || (lang[browser]?browser:"en");

let btn=[...document.querySelectorAll('.language-btn')]
.find(b=>b.getAttribute("onclick").includes(langToUse));

if(btn) setLang(langToUse,btn);

};

</script>

</body>
</html>
