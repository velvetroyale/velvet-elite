<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velvet Elite - Men Application</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* { box-sizing: border-box; }

body {
    margin:0;
    font-family: Arial;
    background:#0b0b0b;
    color:#d4af37;
}

.container {
    max-width:850px;
    margin:auto;
    padding:20px;
}

h1 {
    text-align:center;
    margin-bottom:20px;
}

.card {
    background:#141414;
    padding:22px;
    border-radius:12px;
    border:1px solid rgba(212,175,55,0.25);
    margin-bottom:15px;
}

p {
    margin:0;
    opacity:0.9;
}

input, textarea {
    width:100%;
    padding:12px;
    margin:8px 0 14px;
    background:#111;
    border:1px solid rgba(212,175,55,0.2);
    color:#d4af37;
    border-radius:6px;
    outline:none;
}

input:focus, textarea:focus {
    border-color:#d4af37;
    box-shadow:0 0 10px rgba(212,175,55,0.2);
}

button {
    width:100%;
    padding:16px;
    background:#d4af37;
    color:#0b0b0b;
    border:none;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
}

button:hover {
    background:#e6c35a;
}

label {
    font-size:14px;
    opacity:0.9;
}

.phone-row {
    display:flex;
    gap:10px;
}

.phone-row input:first-child {
    max-width:120px;
}

.hint {
    font-size:12px;
    opacity:0.7;
    margin-top:-8px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>💼 Men Application</h1>

<div class="card">
<p>
Apply for access to Velvet Elite private matchmaking system.
Applications are reviewed for approval.
</p>
</div>

<div class="card">

<!-- Hidden iframe prevents redirect -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<form 
  action="https://formsubmit.co/rg.salesnetwork@gmail.com" 
  method="POST"
  target="hidden_iframe"
  onsubmit="redirectAfterSubmit()"
>

<!-- FormSubmit settings -->
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_subject" value="💼 New Velvet Elite Men Application">

<!-- CLEAN COLUMN NAMES -->
<label>First Name *</label>
<input type="text" name="First Name" required>

<label>Last Name *</label>
<input type="text" name="Last Name" required>

<label>Email *</label>
<input type="email" name="Email" required>

<label>Phone (optional)</label>

<div class="phone-row">
  <input type="text" name="Country Code" placeholder="+1">
  <input type="tel" name="Phone" placeholder="1234567890">
</div>

<label>Age *</label>
<input type="number" name="Age" min="18" required>

<label>Location *</label>
<input type="text" name="Location" required>

<label>Occupation</label>
<input type="text" name="Occupation">

<label>Relationship Goals</label>
<input type="text" name="Relationship Goals">

<label>Message</label>
<textarea name="Message"></textarea>

<button type="submit">Submit Application</button>

</form>

</div>

</div>

<script>
function redirectAfterSubmit() {
    setTimeout(function () {
        window.location.href = "https://velvetroyale.github.io/velvet-elite/thanks.html";
    }, 900);
}
</script>

</body>
</html>
