<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velvet Elite - Men Application</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0b0b;
    color:#fff;
}

.container {
    max-width:850px;
    margin:auto;
    padding:20px;
}

h1 {
    color:#7CFFB2;
    text-align:center;
}

.card {
    background:#1a1a1a;
    padding:22px;
    border-radius:12px;
    border:1px solid #333;
    margin-bottom:15px;
}

input, textarea {
    width:100%;
    padding:12px;
    margin:8px 0 14px 0;
    background:#111;
    border:none;
    color:#fff;
    border-radius:6px;
}

button {
    width:100%;
    padding:16px;
    background:#7CFFB2;
    border:none;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>💼 Men Application</h1>

<div class="card">
<p>
Apply for access to Velvet Elite private matchmaking system.
Applications are reviewed for approval.
</p>
</div>

<div class="card">

<form action="https://formsubmit.co/rg.salesnetwork@gmail.com" method="POST">

<!-- redirect -->
<input type="hidden" name="_next" value="https://velvetroyale.github.io/velvet-elite/thanks.html">

<!-- disable captcha -->
<input type="hidden" name="_captcha" value="false">

<!-- subject -->
<input type="hidden" name="_subject" value="New Velvet Elite Men Application">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Age</label>
<input type="number" name="age" required>

<label>Location</label>
<input type="text" name="location" required>

<label>Occupation</label>
<input type="text" name="occupation">

<label>Relationship Goals</label>
<input type="text" name="goal">

<label>Message</label>
<textarea name="message"></textarea>

<button type="submit">Submit Application</button>

</form>

</div>

</div>

</body>
</html>
